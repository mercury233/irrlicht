name: CI Build & Test

on:
  push:
    branches: [ mercury ]
  pull_request:
    branches: [ main, master, trunk, mercury ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (VS2022 x64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Check DirectX SDK
        id: dxsdk
        uses: actions/cache@v4
        with:
          key: dxsdk
          path: DXSDK

      - name: Download DirectX SDK
        if: steps.dxsdk.outputs.cache-hit != 'true'
        id: dxsdk-download
        uses: mercury233/action-cache-download-file@v1.0.0
        with:
          url: https://download.microsoft.com/download/a/e/7/ae743f1f-632b-4809-87a9-aa1bb3458e31/DXSDK_Jun10.exe

      - name: Install DirectX SDK
        if: steps.dxsdk.outputs.cache-hit != 'true'
        run: |
          7z x ${{ steps.dxsdk-download.outputs.filepath }} -aoa

      - name: Set DirectX SDK environment variable
        run: |
          $dxsdkPath = Resolve-Path 'DXSDK'
          "DXSDK_DIR=$($dxsdkPath.ProviderPath)\" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Irrlicht DLL
        run: msbuild source\Irrlicht\Irrlicht17.0.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Build Examples
        run: msbuild examples\BuildAllExamples_vc17.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Build Tests
        run: msbuild tests\tests_vc17.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Run Tests
        working-directory: tests
        run: ..\bin\Win64-VisualStudio\tests.exe
        continue-on-error: true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-windows
          path: tests/tests.log
          if-no-files-found: ignore

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-windows-x64
          path: |
            bin/Win64-VisualStudio/
            lib/Win64-visualStudio/

  build-ubuntu:
    name: Ubuntu 24.04
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl-dev libxxf86vm-dev libx11-dev libxext-dev libxcursor-dev xvfb gdb

      - name: Build Irrlicht static library
        run: make -C source/Irrlicht -j$(nproc) NDEBUG=1

      - name: Build Examples
        run: make -C examples

      - name: Build Tests
        run: make -C tests all_linux

      - name: Run Tests
        working-directory: tests
        run: |
          ulimit -c unlimited
          echo "$PWD/core.%e.%p" | sudo tee /proc/sys/kernel/core_pattern
          xvfb-run ../bin/Linux/tests 2>&1 || true
          if [ -f core.* ]; then
            echo "::group::Backtrace from core dump"
            gdb -batch -ex "thread apply all bt full" ../bin/Linux/tests core.* 2>&1 || true
            echo "::endgroup::"
          fi
        continue-on-error: true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-ubuntu
          path: tests/tests.log
          if-no-files-found: ignore

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-ubuntu
          path: |
            bin/Linux/
            lib/Linux/

  build-macos:
    name: macOS 15 (ARM)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Build Irrlicht static library
        run: make -C source/Irrlicht staticlib_osx NDEBUG=1 -j$(sysctl -n hw.ncpu)

      - name: Build Examples
        continue-on-error: true
        run: |
          mkdir -p bin/MacOSX
          for dir in examples/[0123]* examples/Demo; do
            if [ -d "$dir" ] && ls "$dir"/*.cpp > /dev/null 2>&1; then
              name=$(basename "$dir")
              echo "::group::Building $name"
              c++ -std=c++14 -Iinclude -O3 -fno-exceptions -DGL_SILENCE_DEPRECATION \
                "$dir"/*.cpp -o "bin/MacOSX/$name" \
                -Llib/MacOSX -lIrrlicht \
                -framework OpenGL -framework Cocoa -framework IOKit -framework Carbon \
                2>&1 || echo "::warning::$name failed to build"
              echo "::endgroup::"
            fi
          done

      - name: Build Tests
        run: |
          mkdir -p bin/MacOSX
          c++ -std=c++14 -Iinclude -Wall -O3 -fno-exceptions -DGL_SILENCE_DEPRECATION \
            tests/*.cpp -o bin/MacOSX/tests \
            -Llib/MacOSX -lIrrlicht \
            -framework OpenGL -framework Cocoa -framework IOKit -framework Carbon

      - name: Run Tests
        working-directory: tests
        run: ../bin/MacOSX/tests
        continue-on-error: true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-macos
          path: tests/tests.log
          if-no-files-found: ignore

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: |
            bin/MacOSX/
            lib/MacOSX/
